# default.yml controls global settings and policies/reports that run on all hosts ("All fleets").

policies:
reports:
agent_options:
controls:
  windows_enabled_and_configured: true
org_settings:
  server_settings:
    server_url: $FLEET_URL
  org_info:
    org_name: Fleet
  secrets:
    - secret: "$FLEET_GLOBAL_ENROLL_SECRET"
