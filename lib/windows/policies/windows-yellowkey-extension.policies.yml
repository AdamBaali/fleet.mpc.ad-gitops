- name: Windows YellowKey osquery extension loaded
  query: |
    SELECT 1 FROM windows_yellowkey LIMIT 1;
  description: |
    Passes when the windows_yellowkey extension is loaded, so the
    windows-yellowkey report can read it. When the extension is missing
    the table does not exist, the query errors, and the policy fails.
    Failing hosts run install-yellowkey-extension.ps1.

    Fleet caps run_script retries at 3 per failure. A host that still
    fails has likely lost egress to the release URL or could not restart
    orbit.
  resolution: |
    install-yellowkey-extension.ps1 downloads, registers, and loads the
    extension. If a host stays failing, check the script output in
    Fleet > Hosts > Activity and confirm the host can reach the release URL.
  platform: windows
  run_script:
    path: ../scripts/install-yellowkey-extension.ps1
