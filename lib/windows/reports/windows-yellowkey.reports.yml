- name: Windows YellowKey BitLocker bypass exposure
  automations_enabled: false
  description: |
    Identifies Windows hosts exposed to the YellowKey BitLocker bypass
    (CVE-2026-45585, disclosed May 12 2026, Microsoft mitigation
    published May 19, no full patch as of May 22 2026).

    Affects Windows 11 and Server 2022/2025. Windows 10 is not affected.
    Microsoft's mitigation strips autofstx.exe from the WinRE image's
    Session Manager BootExecute. Disabling WinRE is a heavier control
    that also closes the path. TPM + PIN blocks the published PoC but
    not the researcher's withheld variant.

    Uses only native osquery tables. WinRE state cannot be read
    natively, so an affected host with BitLocker on and no Fleet
    mitigation marker is reported as `exposed` on the assumption that
    WinRE is enabled (Microsoft's default on supported SKUs).

    The `mitigated` verdict comes from the BootExecMitigated marker
    that mitigate-windows-yellowkey.ps1 writes on success at
    HKLM\SOFTWARE\Fleet\YellowKey\BootExecMitigated. If a host is
    mitigated via the heavier reagentc /disable escalation instead,
    that won't be reflected here; run verify-windows-yellowkey.ps1 on
    demand for full per-host state.

    yellowkey_exposure_verdict:
      not_affected   Windows 10
      mitigated      Fleet BootExecMitigated marker set (autofstx strip applied)
      bitlocker_off  BitLocker not protecting the volume
      exposed        BitLocker on + no mitigation marker (WinRE assumed on)
      unknown        unrecognised OS
  discard_data: false
  interval: 86400
  logging: snapshot
  observer_can_run: true
  platform: windows
  query: |
    SELECT
      ov.name AS os_name,
      ov.build AS os_build,
      b.drive_letter,
      b.encryption_method,
      CASE
        WHEN b.drive_letter IS NULL    THEN 'no_bitlocker_volume'
        WHEN b.protection_status = 1   THEN 'protected'
        WHEN b.protection_status = 0   THEN 'unprotected'
        WHEN b.conversion_status = 3   THEN 'decrypting'
        ELSE 'unknown'
      END AS bitlocker_state,
      (SELECT data FROM registry
       WHERE key = 'HKEY_LOCAL_MACHINE\SOFTWARE\Fleet\YellowKey'
         AND name = 'BootExecMitigated') AS mitigation_marker,
      CASE
        WHEN ov.name LIKE '%Windows 10%'                       THEN 'not_affected'
        WHEN (SELECT data FROM registry
              WHERE key = 'HKEY_LOCAL_MACHINE\SOFTWARE\Fleet\YellowKey'
                AND name = 'BootExecMitigated') = '1'          THEN 'mitigated'
        WHEN b.protection_status = 0                            THEN 'bitlocker_off'
        WHEN ov.name LIKE '%Windows 11%'                       THEN 'exposed'
        WHEN ov.name LIKE '%Server 2022%'                      THEN 'exposed'
        WHEN ov.name LIKE '%Server 2025%'                      THEN 'exposed'
        ELSE 'unknown'
      END AS yellowkey_exposure_verdict
    FROM os_version ov
    LEFT JOIN bitlocker_info b ON 1=1;
