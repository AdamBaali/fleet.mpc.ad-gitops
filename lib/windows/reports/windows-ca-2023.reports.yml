- name: Windows Secure Boot CA 2023 migration state
  automations_enabled: false
  description: |
    Per-host migration state for KB5025885 / CVE-2023-24932. Three
    rows per host, one per boot binary.

    Firmware signals from snapshot-windows-ca-2023.ps1 are optional.
    When the snapshot file is absent, the `firmware_db_has_ca_2023`
    and `esp_bootmgr_issuer` columns read `run snapshot script` so
    the action is obvious, and the verdict falls back to the
    registry + file signal logic.

    Snapshot path:
      C:\ProgramData\Fleet\state\windows-ca-2023-snapshot.txt
    Run via: Fleet > Controls > Scripts > snapshot-windows-ca-2023.ps1

    compliance_verdict:
      compliant_via_files            OS-side file signed by CA 2023
      compliant_via_firmware         ESP boot manager signed by CA 2023 (snapshot)
      compliant_via_registry         registry says servicing finished
      in_progress                    servicing in flight
      errored                        UEFICA2023Error != 0
      not_started_ready_to_trigger   firmware DB has CA 2023, never triggered (snapshot)
      not_started_cu_missing         firmware DB lacks CA 2023, no CU yet (snapshot)
      not_started                    no other signals (run snapshot for refinement)
  discard_data: false
  interval: 86400
  logging: snapshot
  observer_can_run: true
  platform: windows
  query: |
    WITH snap AS (
      SELECT
        MAX(CASE WHEN line LIKE 'firmware_db_has_ca_2023=%'
                 THEN SUBSTR(line, INSTR(line, '=') + 1) END) AS firmware_db_has_ca_2023,
        MAX(CASE WHEN line LIKE 'esp_bootmgr_issuer=%'
                 THEN SUBSTR(line, INSTR(line, '=') + 1) END) AS esp_bootmgr_issuer
      FROM file_lines
      WHERE path = 'C:\ProgramData\Fleet\state\windows-ca-2023-snapshot.txt'
    )
    SELECT
      expected_paths.path,
      a.issuer_name,
      CASE
        WHEN a.issuer_name LIKE '%Windows UEFI CA 2023%' THEN 'migrated'
        WHEN a.issuer_name LIKE '%Production PCA 2011%' THEN 'not_migrated'
        WHEN a.issuer_name IS NULL                       THEN 'missing_or_unreadable'
        ELSE 'unknown'
      END AS file_status,
      (SELECT data FROM registry
       WHERE key = 'HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\SecureBoot\Servicing'
         AND name = 'UEFICA2023Status') AS reg_status,
      (SELECT data FROM registry
       WHERE key = 'HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\SecureBoot\Servicing'
         AND name = 'WindowsUEFICA2023Capable') AS reg_capable,
      (SELECT data FROM registry
       WHERE key = 'HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\SecureBoot\Servicing'
         AND name = 'UEFICA2023Error') AS reg_error,
      COALESCE(snap.firmware_db_has_ca_2023, 'run snapshot script') AS firmware_db_has_ca_2023,
      COALESCE(snap.esp_bootmgr_issuer,      'run snapshot script') AS esp_bootmgr_issuer,
      CASE
        WHEN a.issuer_name LIKE '%Windows UEFI CA 2023%'
          THEN 'compliant_via_files'
        WHEN snap.esp_bootmgr_issuer = 'ca_2023'
          THEN 'compliant_via_firmware'
        WHEN (SELECT data FROM registry
              WHERE key = 'HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\SecureBoot\Servicing'
                AND name = 'UEFICA2023Status') = 'Updated'
         AND (SELECT data FROM registry
              WHERE key = 'HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\SecureBoot\Servicing'
                AND name = 'WindowsUEFICA2023Capable') = '2'
         AND IFNULL((SELECT data FROM registry
                     WHERE key = 'HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\SecureBoot\Servicing'
                       AND name = 'UEFICA2023Error'), '0') = '0'
          THEN 'compliant_via_registry'
        WHEN CAST(IFNULL((SELECT data FROM registry
                          WHERE key = 'HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\SecureBoot\Servicing'
                            AND name = 'UEFICA2023Error'), '0') AS INTEGER) > 0
          THEN 'errored'
        WHEN (SELECT data FROM registry
              WHERE key = 'HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\SecureBoot\Servicing'
                AND name = 'UEFICA2023Status') = 'InProgress'
          THEN 'in_progress'
        WHEN snap.firmware_db_has_ca_2023 = 'True'
          THEN 'not_started_ready_to_trigger'
        WHEN snap.firmware_db_has_ca_2023 = 'False'
          THEN 'not_started_cu_missing'
        ELSE 'not_started'
      END AS compliance_verdict
    FROM (
      SELECT 'C:\Windows\Boot\EFI\bootmgfw.efi' AS path
      UNION ALL SELECT 'C:\Windows\System32\winload.efi'
      UNION ALL SELECT 'C:\Windows\System32\winresume.efi'
    ) AS expected_paths
    LEFT JOIN authenticode AS a ON expected_paths.path = a.path
    LEFT JOIN snap ON 1=1;
