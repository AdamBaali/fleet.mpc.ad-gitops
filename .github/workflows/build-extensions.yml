name: 'Build osquery extensions'

# Auto-discovers every directory under `extensions/` and builds its Windows
# binaries via its Makefile. Builds on push to main and on PRs that touch
# extensions/ (compile check + downloadable artifacts), and publishes the
# .exe files as release assets on a tag push.

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
      - 'extensions-v*'
  pull_request:
    paths:
      - 'extensions/**'
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Discover extensions
        id: discover
        run: |
          set -euo pipefail
          if [ ! -d extensions ]; then
            echo "No extensions/ directory; nothing to build."
            echo "exts=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          exts=$(find extensions -mindepth 1 -maxdepth 1 -type d \
            ! -name '_*' -printf '%f\n' | sort)
          echo "Discovered extensions:"
          echo "$exts"
          {
            echo 'exts<<EOF'
            echo "$exts"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Build each extension
        if: steps.discover.outputs.exts != ''
        run: |
          set -euo pipefail
          while IFS= read -r ext; do
            [ -z "$ext" ] && continue
            dir="extensions/$ext"
            if [ ! -f "$dir/Makefile" ]; then
              echo "::warning::$dir has no Makefile; skipping."
              continue
            fi
            echo "::group::Building $dir"
            (cd "$dir" && make windows)
            echo "::endgroup::"
          done <<< "${{ steps.discover.outputs.exts }}"

      - name: Collect artifacts
        if: steps.discover.outputs.exts != ''
        id: collect
        run: |
          set -euo pipefail
          mkdir -p release
          # Grab every .exe one level under extensions/<name>/
          found=$(find extensions -mindepth 2 -maxdepth 2 -name '*.exe' || true)
          if [ -z "$found" ]; then
            echo "::warning::No .exe artifacts found after build."
            echo "have_artifacts=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "$found" | xargs -I{} cp {} release/
          ls -la release/
          echo "have_artifacts=true" >> "$GITHUB_OUTPUT"

      - name: Upload release assets
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && steps.collect.outputs.have_artifacts == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Upload build artifacts
        if: "!startsWith(github.ref, 'refs/tags/') && steps.collect.outputs.have_artifacts == 'true'"
        uses: actions/upload-artifact@v4
        with:
          name: extensions
          path: release/*.exe
          if-no-files-found: error
          retention-days: 30
