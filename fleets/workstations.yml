name: "💻 Workstations"
policies:
  - path: ../lib/windows/policies/windows-yellowkey-extension.policies.yml
reports:
  - path: ../lib/windows/reports/windows-yellowkey.reports.yml
agent_options:
  config:
    options:
      pack_delimiter: /
      logger_tls_period: 10
      distributed_plugin: tls
      disable_distributed: false
      logger_tls_endpoint: /api/osquery/log
      distributed_interval: 10
      distributed_tls_max_attempts: 3
  overrides:
    platforms:
      # Windows hosts load the windows_yellowkey osquery extension from
      # extensions.load. fleetd regenerates osquery.flags from these options on
      # every config refresh, so the flags must live here, not in osquery.flags.
      windows:
        options:
          pack_delimiter: /
          logger_tls_period: 10
          distributed_plugin: tls
          disable_distributed: false
          logger_tls_endpoint: /api/osquery/log
          distributed_interval: 10
          distributed_tls_max_attempts: 3
          disable_extensions: false
          extensions_autoload: 'C:\Program Files\Orbit\extensions.load'
          extensions_timeout: 10
          extensions_interval: 3
controls:
  scripts:
    - path: ../lib/windows/scripts/mitigate-windows-yellowkey.ps1
    - path: ../lib/windows/scripts/install-yellowkey-extension.ps1
software:
  packages:
    - path: ../lib/macos/software/munki.yml
settings:
  secrets:
    - secret: "$FLEET_WORKSTATIONS_ENROLL_SECRET"
